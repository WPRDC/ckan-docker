version: "3"

volumes:
  ckan_storage:
  pg_data:
  solr_data:

services:

  ckan-dev:
    build:
      context: ckan/
      dockerfile: Dockerfile.dev
      args:
        - TZ=${TZ}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      solr:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "0.0.0.0:${CKAN_PORT_HOST}:${CKAN_PORT}"
    volumes:
      - ckan_storage:/var/lib/ckan
      - ./src:/srv/app/src_extensions
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:5000"]

  datapusher-plus:
    container_name: datapusher-plus
    platform: linux/arm64/v8
    build:
      context: ./datapusher-plus
      dockerfile: Dockerfile
      args:
        - ARCHITECTURE=${DATAPUSHER_ARCHITECTURE}
    ports:
      - "8800:8800"
    links:
      - ckan-dev
      - db
    depends_on:
      - db
      - ckan-dev
    environment:
      - DATASTORE_DB
      - DATAPUSHER_PASSWORD
      - DATAPUSHER_JOBS_PASSWORD
      - SQLALCHEMY_DATABASE_URI=postgresql://datapusher_jobs:${DATAPUSHER_JOBS_PASSWORD}@db/datapusher_jobs
      - WRITE_ENGINE_URL="postgresql://datapusher:${DATAPUSHER_PASSWORD}@db/${DATASTORE_DB}"
    env_file:
      - ./datapusher-plus/.env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO", "/dev/null", "http://localhost:8800" ]

  db:
    build:
      context: postgresql/
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - CKAN_DB_USER
      - CKAN_DB_PASSWORD
      - CKAN_DB
      - DATASTORE_READONLY_USER
      - DATASTORE_READONLY_PASSWORD
      - DATASTORE_DB
      - DATAPUSHER_PASSWORD
      - DATAPUSHER_JOBS_PASSWORD
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "0.0.0.0:${DB_PORT_HOST}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
     
  solr:
    image: ckan/ckan-solr:${SOLR_IMAGE_VERSION}
    volumes:
      - solr_data:/var/solr
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8983/solr/"]

  redis:
    image: redis:${REDIS_VERSION}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-e", "QUIT"]
