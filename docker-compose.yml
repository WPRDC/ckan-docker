version: "3"


volumes:
  ckan_storage:
  pg_data:
  solr_data:

services:

  ckan:
    container_name: ${CKAN_CONTAINER_NAME}
    build:
      context: ckan/
      dockerfile: Dockerfile
      args:
        - TZ=${TZ}
    networks:
      - ckannet
      - solrnet
      - redisnet
    env_file:
      - .env
    depends_on:
      solr:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /data/ckan:/var/lib/ckan
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:5000"]
    
  datapusher-plus:
    container_name: datapusher-plus
    build:
      context: ./datapusher-plus
      dockerfile: Dockerfile
    ports:
      - "8800:8800"
    networks:
      - ckannet
    links:
      - ckan-dev
    depends_on:
      - ckan-dev
    environment:
      - DATASTORE_DB
      - DATAPUSHER_PASSWORD
      - DATAPUSHER_JOBS_PASSWORD
    env_file:
      - ./datapusher-plus/.env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO", "/dev/null", "http://localhost:8800" ]

  solr:
    container_name: ${SOLR_CONTAINER_NAME}
    networks:
      - solrnet
    image: ckan/ckan-solr:${SOLR_IMAGE_VERSION}
    volumes:
      - solr_data:/var/solr
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8983/solr/"]

  redis:
    container_name: ${REDIS_CONTAINER_NAME}
    image: redis:${REDIS_VERSION}
    networks:
      - redisnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-e", "QUIT"]

  tiles:
    build:
      context: martin/
    platform: linux/x86_64
    networks:
      - ckannet
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - "DATABASE_URL=${CKAN_DATASTORE_READ_URL}"

networks:
  ckannet:
  solrnet:
    internal: true
  redisnet:
    internal: true
